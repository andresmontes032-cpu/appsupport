<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico de soporte nivel 2</title>
<style>
  :root {
    --bg: #12161c;
    --panel: #1a2029;
    --border: #2a3140;
    --text: #e4e7eb;
    --text-secondary: #9aa4b2;
    --accent: #4f9dde;
    --danger: #e0574c;
    --success: #4caf7d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    padding: 32px 16px;
  }
  .container { max-width: 720px; margin: 0 auto; }
  h1 {
    font-size: 20px;
    font-weight: 500;
    margin: 0 0 4px;
  }
  p.subtitle {
    color: var(--text-secondary);
    font-size: 14px;
    margin: 0 0 24px;
  }
  textarea {
    width: 100%;
    min-height: 90px;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
  }
  textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  button {
    background: var(--accent);
    color: #06111c;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
  button.secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  #estado {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 12px;
  }
  #resultado {
    margin-top: 20px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    display: none;
    white-space: pre-wrap;
    font-size: 14px;
    line-height: 1.7;
  }
  #resultado.visible { display: block; }
  .error {
    color: var(--danger);
  }
</style>
</head>
<body>
<div class="container">
  <h1>Diagnóstico de soporte nivel 2</h1>
  <p class="subtitle">Describe el problema reportado y recibe posibles causas y pasos de solución generados por IA.</p>

  <textarea id="problema" placeholder="Ej: Autodesk no abre, error de licencia de red"></textarea>
  <div class="actions">
    <button id="btn-diagnosticar" onclick="diagnosticar()">Buscar solución</button>
    <button class="secondary" onclick="limpiar()">Limpiar</button>
  </div>
  <div id="estado"></div>
  <div id="resultado"></div>
</div>

<script>
  // Cambia esta ruta si tu función serverless queda en otra URL.
  const ENDPOINT = "/.netlify/functions/diagnose";

  async function diagnosticar() {
    const problema = document.getElementById("problema").value.trim();
    const estado = document.getElementById("estado");
    const resultado = document.getElementById("resultado");
    const boton = document.getElementById("btn-diagnosticar");

    if (!problema) {
      estado.textContent = "Escribe una descripción del problema antes de continuar.";
      estado.className = "error";
      return;
    }

    boton.disabled = true;
    estado.className = "";
    estado.textContent = "Consultando diagnóstico...";
    resultado.className = "";
    resultado.textContent = "";

    try {
      const resp = await fetch(ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ problema })
      });

      if (!resp.ok) {
        throw new Error("El servidor respondió con un error (" + resp.status + ")");
      }

      const data = await resp.json();
      resultado.textContent = data.diagnostico || "No se recibió una respuesta válida.";
      resultado.classList.add("visible");
      estado.textContent = "";
    } catch (err) {
      estado.className = "error";
      estado.textContent = "No se pudo obtener el diagnóstico: " + err.message;
    } finally {
      boton.disabled = false;
    }
  }

  function limpiar() {
    document.getElementById("problema").value = "";
    document.getElementById("estado").textContent = "";
    const resultado = document.getElementById("resultado");
    resultado.textContent = "";
    resultado.classList.remove("visible");
  }
</script>
</body>
</html>
